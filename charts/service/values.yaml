# Name of the service
name: hello-api

# Number of replicas to run
replicaCount: 2

# Docker container image with tag
image: "zopdev/sample-go-api:v0.0.4"

extraAnnotations:

Containers:
  privileged: false

# securityContext:                              # Opt-in: uncomment to enable pod and container security hardening
#   runAsNonRoot: true                           # Enforce non-root execution
#   runAsUser: 1000                              # UID for the pod
#   runAsGroup: 1000                             # GID for the pod
#   fsGroup: 1000                                # fsGroup for volume ownership
#   fsGroupChangePolicy: OnRootMismatch          # Only change ownership when needed
#   seccompProfile: RuntimeDefault               # Seccomp profile type
#   readOnlyRootFilesystem: true                 # Make container filesystem read-only

imagePullSecrets:
  # - gcr-secrets
  # - acr-secrets
  # - ecr-secrets

# Port on which container runs its services
httpPort: 8000

injectIstio: false

ports: # Provide the ports on which container runs its services
# grpc: 9100

nginx:
  host:
  annotations:
  tlsHost:
  tlsSecretName: 

metricsScrapeInterval: 30s

envFrom:
  secrets: [] #List of secrets
  configmaps: [] #List of Configmaps

# Resource allocations
minCPU: "100m"
minMemory: "128M"
maxCPU: "500m"
maxMemory: "512M"
minReplicas: 2
maxReplicas: 4
minAvailable: 1

# KEDA Autoscaler Configuration
# When keda.enabled is true, a KEDA ScaledObject is created instead of the native HPA.
# Requires KEDA operator to be installed in the cluster.
keda:
  enabled: false
  # pollingInterval: 30
  # cooldownPeriod: 300
  # idleReplicaCount:            # Set to 0 to scale down to zero replicas when there is no traffic
  # fallback:
  #   failureThreshold: 3
  #   replicas: 2
  triggers: []
  #
  # Scale based on HTTP traffic (scale to zero when no traffic):
  # - type: prometheus
  #   metadata:
  #     serverAddress: http://prometheus:9090
  #     metricName: http_requests_per_second
  #     query: sum(rate(istio_requests_total{destination_service_name="my-service"}[2m]))
  #     threshold: "10"
  # With idleReplicaCount: 0, KEDA will scale to 0 replicas when the query returns 0.
  #
  # Scale based on CPU/Memory:
  # - type: cpu
  #   metadata:
  #     type: Utilization
  #     value: "80"
  # - type: memory
  #   metadata:
  #     type: Utilization
  #     value: "80"
  #
  # Scale based on Kafka consumer lag:
  # - type: kafka
  #   metadata:
  #     bootstrapServers: kafka:9092
  #     consumerGroup: my-group
  #     topic: my-topic
  #     lagThreshold: "50"
  #   authenticationRef:
  #     name: kafka-trigger-auth
  #
  # authentication: []
  # - name: kafka-trigger-auth
  #   secretTargetRef:
  #     - parameter: sasl_password
  #       name: kafka-secret
  #       key: password

# Whether application is a CLI service
cliService: false

# Heartbeat URL
heartbeatURL: ""

readinessProbe:
  enable: false
#  initialDelaySeconds: 3
#  timeoutSeconds: 3
#  periodSeconds: 10
#  failureThreshold: 3

livenessProbe:
  enable: false
#  initialDelaySeconds: 3
#  timeoutSeconds: 3
#  periodSeconds: 10
#  failureThreshold: 3

# All environment variables can be passed as a map
env:
  # APP_NAME: hello-api

# Environment variables as a list (new format)
envList:
  # - name: APP_NAME
  #   value: hello-api
  # - name: DB_HOST
  #   value: localhost


appSecrets: false

command :

volumeMounts:
  emptyDir:
#    - name: zopdev-emptydir
  configmaps:
#    - name: zopdev-configmap
#      mountPath: /etc/env
#      configName:
#      readOnly: true
  secrets:
#    - name: zopdev-secret
#      mountPath: /etc/secret
#      readOnly: true
#      secretName: 
  pvc:
#    - name: zopdev-volume
#      mountPath: /etc/data
#      pvcName: zopdev-pvc

alerts:
  standard:
    infra:
      unavailableReplicasThreshold: 0                   # Alert if the available replicas is lesser than number of desired replicas
      podRestartThreshold: 0                            # Alert if the pod restarts goes beyond threshold over a 5-minute window.
      podRestartTimeWindow: "5m"                        # Time window  ,default "5m"
      hpaNearingMaxPodThreshold: 80                     # Alert if replica count crosses the threshold percentage of max pod count
      serviceMemoryUtilizationThreshold: 90             # Alert if service memory exceeds threshold
      serviceCpuUtilizationThreshold: 90                # Alert if service cpu exceeds threshold
      serviceCpuUtilizationTimeWindow: "5m"             # Time window for service cpu utilization
      healthCheckFailureThreshold: 50                   # Alert if  application health-check failures goes beyond 50 in a 5-minute window.
      healthCheckFailureTimeWindow: "5m"                # Time window  ,default "5m"
  custom:
  # - name: "Custom alert if user_created events goes below threshold for 5 min"
  #   description: "Custom alert if user_created events goes below threshold for 5 min"
  #   alertRule: "user_post_get_counter" # Metric Name exposed by /metric endpoint
  #   sumByLabel: "events" # Metric events key; can be empty string
  #   percentile: -1.0 #Percentile is useful for histogram queries
  #   labelValue: "user_created" # Metric Event Name; can be empty string
  #   queryOperator: <= # Query Operator, by default its `>`
  #   timeWindow: "5m"
  #   threshold: 1
  #   labels:
  #     severity: critical

