apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-clickhouse-headless
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}-clickhouse
spec:
  # Headless service backing the StatefulSet — gives each pod a stable DNS
  # name and is required for correct per-pod network identity.
  clusterIP: None
  publishNotReadyAddresses: true
  ports:
    - port: 8123
      targetPort: 8123
      protocol: TCP
      name: http
    - port: 9000
      targetPort: 9000
      protocol: TCP
      name: native
    - port: 9009
      targetPort: 9009
      protocol: TCP
      name: interserver
  selector:
    app: {{ .Release.Name }}-clickhouse
