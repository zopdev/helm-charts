{{- range $index, $service := .Values.services }}
{{- $maxLen := 27 }}
{{- $randomSuffix := randAlphaNum 4 | lower }}
{{- $trimmedName := trunc $maxLen $service.name }}
{{- $generatedUsername := printf "%s_%s" $trimmedName $randomSuffix }}
{{- $generatedPassword := printf "%s%s%s" (randAlpha 4) (randNumeric 4) (randAlpha 4 | upper) }}

{{/* Resource names */}}
{{- $configMapName := printf "%s-%s-%s-clickhouse-configmap" $.Release.Name (replace "_" "-" $service.database) $service.name }}
{{- $secretName := printf "%s-%s-%s-clickhouse-database-secret" $.Release.Name (replace "_" "-" $service.database) $service.name }}

{{/* Preserve generated credentials across upgrades: the username lives in the
     ConfigMap, the password in the Secret. */}}
{{- $existingConfigMap := lookup "v1" "ConfigMap" $.Release.Namespace $configMapName }}
{{- $existingSecret := lookup "v1" "Secret" $.Release.Namespace $secretName }}

{{- $username := $generatedUsername }}
{{- $password := $generatedPassword }}

{{- if and $existingConfigMap (hasKey $existingConfigMap.data "USERNAME") }}
  {{- $username = index $existingConfigMap.data "USERNAME" }}
{{- end }}
{{- if and $existingSecret (hasKey $existingSecret.data "PASSWORD") }}
  {{- $password = index $existingSecret.data "PASSWORD" | b64dec }}
{{- end }}

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $configMapName }}
  namespace: {{ $.Release.Namespace }}
data:
  # GoFr ClickHouse connection config keys (https://gofr.dev/docs/datasources/clickhouse).
  # HOSTS is host:port (GoFr accepts a comma-separated list); native TCP port 9000.
  HOSTS: "{{ $.Release.Name }}-clickhouse:9000"
  USERNAME: "{{ $username }}"
  DATABASE: "{{ $service.database }}"
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ $.Release.Namespace }}
type: Opaque
data:
  PASSWORD: {{ $password | b64enc }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $.Release.Name }}-{{ $service.name }}-init-script
  namespace: {{ $.Release.Namespace }}
type: Opaque
stringData:
  db-init.sql: |
    CREATE DATABASE IF NOT EXISTS `{{ $service.database }}`;

    CREATE USER IF NOT EXISTS '{{ $username }}' IDENTIFIED WITH sha256_password BY '{{ $password }}';

    GRANT SELECT, INSERT, ALTER, CREATE, DROP, TRUNCATE, OPTIMIZE ON `{{ $service.database }}`.* TO '{{ $username }}';
{{- end }}
