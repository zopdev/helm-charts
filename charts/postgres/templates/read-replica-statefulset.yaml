{{- if .Values.readReplica.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Release.Name }}-postgres-read
  namespace: {{ .Release.Namespace | quote }}
  labels:
    app.kubernetes.io/part-of: postgres
    app: {{ $.Release.Name }}-postgres-read
spec:
  replicas: {{ .Values.readReplica.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/part-of: postgres
      app: {{ $.Release.Name }}-postgres-read
  serviceName: {{ $.Release.Name }}-postgres-read
  updateStrategy:
    type: {{ .Values.updateStrategy.type }}
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: postgres
        app: {{ $.Release.Name }}-postgres-read
    spec:
      containers:
        - name: postgres
          image: "postgres:{{ .Values.version }}"
          imagePullPolicy: "IfNotPresent"
          ports:
            - containerPort: 5432
          resources:
            requests:
              memory: {{ .Values.readReplica.resources.requests.memory }}
              cpu: {{ .Values.readReplica.resources.requests.cpu}}
            limits:
              memory: {{ .Values.readReplica.resources.limits.memory }}
              cpu: {{ .Values.readReplica.resources.limits.cpu }}
          env:
          - name: POSTGRES_PASSWORD
            valueFrom:
              secretKeyRef:
                name: {{ $.Release.Name }}-postgres-root-secret
                key: postgres-password
          - name: PGDATA
            value: "/var/lib/postgresql/data/db/"
          - name: POSTGRES_REPLICATION_MODE
            value: "replica"
          - name: POSTGRES_MASTER_HOST
            value: "{{ $.Release.Name }}-postgres"
          - name: POSTGRES_MASTER_PORT
            value: "5432"
          livenessProbe:
            exec:
              command:
              - pg_isready
              - -U
              - "postgres"
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command:
              - pg_isready
              - -U
              - "postgres"
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          volumeMounts:
            - name: {{ $.Release.Name }}-read-persistent-storage
              mountPath: /var/lib/postgresql/data
              subPath: data
  volumeClaimTemplates:
  - metadata:
      name: {{ $.Release.Name }}-read-persistent-storage
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: {{ .Values.readReplica.diskSize }}
{{- end }} 